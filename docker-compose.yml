version: "3.8"

services:
  # Contenedor principal con Jupyter, Spark y entorno visual
  workspace:
    build: .                      # Construye la imagen usando el Dockerfile local
    container_name: bigdata_workspace
    platform: linux/amd64

    ports:
      - "8888:8888"               # Jupyter Lab
      - "4040:4040"               # Interfaz web de Spark
      - "5900:5900"               # Acceso VNC al escritorio
      - "6080:6080"               # Acceso noVNC desde navegador

    volumes:
      - .:/home/jovyan/work       # Monta la carpeta del proyecto dentro del contenedor

    environment:
      - JUPYTER_TOKEN=            # Desactiva token de acceso
      - JUPYTER_PASSWORD=         # Desactiva contraseña
      - JUPYTER_ALLOW_INSECURE_WRITES=true
      - DISPLAY=:0                # Debe coincidir con Xvfb :0

    shm_size: "2gb"               # Evita fallos del navegador por poca memoria compartida

    depends_on:
      - database

    # Ahora usamos un script externo para arrancar todo ordenado
    command: ["/bin/bash", "/home/jovyan/work/start.sh"]

  # Contenedor de base de datos MongoDB
  database:
    image: mongo:latest
    container_name: bigdata_mongodb
    platform: linux/amd64
    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  # Interfaz web para visualizar la base de datos en puerto 8081
  admin-db:
    image: mongo-express:latest
    container_name: bigdata_ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://database:27017/
    depends_on:
      - database

# Volumen persistente para MongoDB
volumes:
  mongo_data:
